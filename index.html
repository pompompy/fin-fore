<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeForecast • Checkbook Ledger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.1/dist/dexie.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    table { border-collapse: collapse; }
    th, td { padding: 14px 16px; text-align: left; vertical-align: top; }
    tr { border-bottom: 1px solid #27272a; }
    .ledger-row:hover { background-color: #18181b; }
    .suggested-row { background-color: #451a03; }
    .prospective-row { font-style: italic; color: #bef575; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-4">
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold flex items-center gap-2">
        <span class="text-emerald-400">📒</span> VibeForecast
      </h1>
      <div class="flex gap-3">
        <button onclick="exportBackup()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm flex items-center gap-2">📤 Backup</button>
        <button onclick="document.getElementById('restoreInput').click()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm flex items-center gap-2">📥 Restore</button>
        <input type="file" id="restoreInput" accept=".json" class="hidden" onchange="importBackup(event)">
      </div>
    </div>

    <!-- TABS -->
    <div class="flex border-b border-zinc-800 mb-6 text-sm overflow-x-auto">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-4 font-medium flex-1 text-center whitespace-nowrap">📒 Ledger</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-4 font-medium flex-1 text-center whitespace-nowrap">📈 Forecast</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-8 py-4 font-medium flex-1 text-center whitespace-nowrap">🔮 Upcoming</button>
      <button onclick="switchTab(3)" id="tab3" class="tab-btn px-8 py-4 font-medium flex-1 text-center whitespace-nowrap">📥 Import CSV</button>
    </div>

    <!-- LEDGER TAB -->
    <div id="panel0" class="tab-panel">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold">Checkbook Ledger</h2>
        <button onclick="detectAndShowInLedger()" class="px-6 py-3 bg-amber-600 hover:bg-amber-500 rounded-2xl text-sm font-medium">🔍 Detect Recurring Patterns</button>
      </div>
      <div class="overflow-x-auto rounded-3xl border border-zinc-800 bg-zinc-900">
        <table class="w-full min-w-[950px] text-sm">
          <thead class="bg-zinc-950 sticky top-0 z-10">
            <tr class="text-zinc-400 text-xs uppercase tracking-widest">
              <th class="font-medium w-44">Date</th>
              <th class="font-medium text-right w-32">Beginning Balance</th>
              <th class="font-medium text-right w-28">Credit</th>
              <th class="font-medium text-right w-28">Debit</th>
              <th class="font-medium text-right w-32">Ending Balance</th>
              <th class="font-medium">Note</th>
            </tr>
          </thead>
          <tbody id="ledgerBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
      <p class="text-xs text-zinc-500 mt-4 text-center">Future → Past • Tap ✏️ to edit displayed note • Suggested rows highlighted</p>
    </div>

    <!-- FORECAST TAB -->
    <div id="panel1" class="tab-panel hidden">
      <div class="bg-zinc-900 rounded-3xl p-8 text-center mb-8">
        <p class="text-zinc-400">Current Balance</p>
        <p id="balanceDisplay" class="text-6xl font-bold mt-2 text-emerald-400">$0.00</p>
      </div>
      <canvas id="forecastChart" class="w-full h-80"></canvas>
      <button onclick="showSetBalanceModal()" class="mt-6 w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-lg font-medium">Set Current Balance</button>
    </div>

    <!-- UPCOMING TAB -->
    <div id="panel2" class="tab-panel hidden">
      <button onclick="detectRecurring()" class="mb-6 w-full py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl flex items-center justify-center gap-2">🔍 Detect Recurring Patterns</button>
      <div id="suggestionsList" class="space-y-3"></div>
      <button onclick="showAddModal()" class="fixed bottom-8 right-8 w-14 h-14 bg-emerald-500 hover:bg-emerald-400 rounded-full shadow-2xl flex items-center justify-center text-3xl">+</button>
    </div>

    <!-- IMPORT CSV TAB -->
    <div id="panel3" class="tab-panel hidden">
      <div class="border-2 border-dashed border-zinc-700 rounded-3xl p-12 text-center">
        <p class="text-2xl mb-4">Import Ally Transactions CSV</p>
        <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleCSVImport(event)">
        <button onclick="triggerCSVImport()" id="importBtn" class="px-10 py-5 bg-white text-zinc-950 rounded-2xl font-semibold text-lg hover:bg-emerald-400">Choose Ally CSV File</button>
        <div id="importStatus" class="mt-6 min-h-[24px]"></div>
        <p class="text-xs text-zinc-500 mt-10">Download from Ally → Checking → Transactions → Download CSV</p>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50" onclick="if(event.target.id==='modal') this.classList.add('hidden')"></div>

  <script>
    const db = new Dexie('VibeForecastDB');
    db.version(2).stores({ transactions: '++id, date, amount, description, isHistorical, userNote, originalDescription' });

    let currentBalance = parseFloat(localStorage.getItem('vibeBalance')) || 0;
    let chartInstance = null;
    let pendingSuggestions = [];

    async function loadData() {
      document.getElementById('balanceDisplay').textContent = '$' + currentBalance.toFixed(2);
      await renderLedger();
      renderForecastChart();
    }

    // === CSV IMPORT (fixed + debug) ===
    function triggerCSVImport() {
      document.getElementById('importStatus').innerHTML = '';
      document.getElementById('csvInput').click();
    }

    async function handleCSVImport(e) {
      const file = e.target.files[0];
      if (!file) return;

      const status = document.getElementById('importStatus');
      status.innerHTML = '📤 Parsing Ally CSV...';

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async (results) => {
          const newTxs = [];

          results.data.forEach(row => {
            if (!row.Date || row.Amount === undefined) return;

            let txDate = new Date(row.Date);
            if (row.Time && row.Time.trim()) {
              const [h, m, s] = row.Time.split(':').map(Number);
              txDate.setHours(h||0, m||0, s||0);
            }

            const amount = parseFloat(row.Amount);
            if (isNaN(amount)) return;

            let fullDesc = (row.Description || '').trim();
            let cleanNote = fullDesc.includes('~ Future Amount') ? fullDesc.split('~ Future Amount')[0].trim() : fullDesc;

            newTxs.push({
              date: txDate.getTime(),
              amount: amount,
              description: fullDesc,
              originalDescription: fullDesc,
              userNote: null,
              isHistorical: true
            });
          });

          if (newTxs.length === 0) {
            status.innerHTML = '❌ No valid rows found.';
            return;
          }

          await db.transactions.bulkAdd(newTxs);
          status.innerHTML = `✅ Imported ${newTxs.length} transactions!`;
          await loadData();
          setTimeout(() => switchTab(0), 1200);
        },
        error: (err) => {
          console.error(err);
          document.getElementById('importStatus').innerHTML = '❌ Parse error – check console.';
        }
      });
    }

    // === LEDGER RENDER (full) ===
    async function renderLedger() {
      const allCommitted = await db.transactions.toArray();
      const sortedCommitted = [...allCommitted].sort((a,b) => a.date - b.date);

      let running = currentBalance;
      const balanceMap = new Map();
      sortedCommitted.forEach(tx => {
        const beg = running;
        running += tx.amount;
        balanceMap.set(tx.id, {beg, end: running});
      });

      function getBalanceBefore(target) {
        let temp = currentBalance;
        for (let tx of sortedCommitted) if (tx.date < target) temp += tx.amount; else break;
        return temp;
      }

      let rows = [];
      allCommitted.forEach(tx => {
        const b = balanceMap.get(tx.id) || {beg:0, end:0};
        const displayNote = tx.userNote || tx.description.split('~ Future Amount')[0].trim();
        rows.push({...tx, isSuggested:false, beg:b.beg, end:b.end, displayNote});
      });

      // Add pending suggestions
      pendingSuggestions.forEach(sug => {
        const beg = getBalanceBefore(sug.date);
        rows.push({...sug, isSuggested:true, beg, end: beg + sug.amount, displayNote: sug.description});
      });

      rows.sort((a,b) => b.date - a.date);

      const tbody = document.getElementById('ledgerBody');
      tbody.innerHTML = rows.map(row => {
        const d = new Date(row.date);
        const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) +
                        (d.getHours() || d.getMinutes() ? ' ' + d.toLocaleTimeString('en-US',{hour:'numeric', minute:'2-digit'}) : '');

        const isProspective = !row.isHistorical && !row.isSuggested;
        const rowClass = row.isSuggested ? 'suggested-row' : (isProspective ? 'prospective-row' : 'ledger-row');

        const credit = row.amount > 0 ? row.amount.toFixed(2) : '';
        const debit  = row.amount < 0 ? Math.abs(row.amount).toFixed(2) : '';

        return `
          <tr class="${rowClass}">
            <td class="font-medium">${dateStr}</td>
            <td class="text-right">$${row.beg.toFixed(2)}</td>
            <td class="text-right text-emerald-400">${credit}</td>
            <td class="text-right text-red-400">${debit}</td>
            <td class="text-right">$${row.end.toFixed(2)}</td>
            <td>
              <div class="flex items-center justify-between gap-2">
                <span onclick="${!row.isSuggested ? `editNote(${row.id})` : ''}" class="${!row.isSuggested ? 'cursor-pointer hover:underline' : ''}">
                  ${row.displayNote || row.description}
                </span>
                ${row.isSuggested ? 
                  `<button onclick="acceptSuggestionFromLedger('${row.id}')" class="px-3 py-1 text-xs bg-emerald-600 rounded-xl">Accept</button>` : 
                  `<button onclick="editNote(${row.id})" class="text-zinc-400 hover:text-white">✏️</button>`
                }
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    // === OTHER FUNCTIONS (shortened but complete) ===
    function switchTab(n) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('panel'+n).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active','border-b-2','border-emerald-400'));
      document.getElementById('tab'+n).classList.add('active','border-b-2','border-emerald-400');
      if (n===0) renderLedger();
      if (n===1) renderForecastChart();
    }

    function renderForecastChart() {
      const ctx = document.getElementById('forecastChart');
      if (chartInstance) chartInstance.destroy();
      db.transactions.toArray().then(all => {
        let bal = currentBalance;
        const points = all.filter(t => t.date >= Date.now())
                         .sort((a,b)=>a.date-b.date)
                         .map(tx => { bal += tx.amount; return {x: new Date(tx.date), y: bal}; });
        chartInstance = new Chart(ctx, {
          type: 'line',
          data: { datasets: [{ label: 'Balance', data: points, borderColor: '#10b981', tension: 0.3 }] },
          options: { scales: { x: { type: 'time' }, y: { beginAtZero: false }}}
        });
      });
    }

    async function
