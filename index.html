<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fin-Fore Ledger • Forecast & Checkbook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.1/dist/dexie.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    table { border-collapse: collapse; }
    th, td { padding: 14px 16px; text-align: left; vertical-align: top; }
    tr { border-bottom: 1px solid #27272a; }
    .ledger-row:hover { background-color: #18181b; }
    .prospective-row { font-style: italic; color: #bef575; transition: background 0.2s; }
    .prospective-row:hover { background-color: #1a2e0e; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-6xl mx-auto p-4">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold flex items-center gap-2">
        <span class="text-emerald-400">📒</span> Fin-Fore Ledger
      </h1>
      <div class="flex gap-3">
        <button onclick="showSetBalanceModal()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm font-medium">Set Current Balance</button>
        <button onclick="exportBackup()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm">📤 Backup</button>
        <button onclick="document.getElementById('restoreInput').click()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm">📥 Restore</button>
        <input type="file" id="restoreInput" accept=".json" class="hidden" onchange="importBackup(event)">
      </div>
    </div>

    <div class="flex border-b border-zinc-800 mb-6 text-sm">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-4 font-medium flex-1">📒 Ledger</button>
      <button onclick="switchTab(3)" id="tab3" class="tab-btn px-8 py-4 font-medium flex-1">📥 Import CSV</button>
    </div>

    <div id="panel0" class="tab-panel">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h2 class="text-2xl font-semibold">Checkbook Ledger</h2>
          <p id="currentBalanceDisplay" class="text-emerald-400 font-medium"></p>
        </div>
        <div class="flex gap-2">
          <button onclick="showAddTransactionModal()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">➕ Add Manual</button>
          <button onclick="detectAndShowInLedger()" class="px-6 py-3 bg-amber-600 hover:bg-amber-500 rounded-2xl text-sm font-medium">🔍 Detect Recurring</button>
        </div>
      </div>
      <div class="overflow-x-auto rounded-3xl border border-zinc-800 bg-zinc-900">
        <table class="w-full min-w-[950px] text-sm">
          <thead class="bg-zinc-950 sticky top-0">
            <tr class="text-zinc-400 text-xs uppercase tracking-widest">
              <th class="w-48">Date</th>
              <th class="text-right w-32">Beg. Balance</th>
              <th class="text-right w-28">Credit</th>
              <th class="text-right w-28">Debit</th>
              <th class="text-right w-32">End. Balance</th>
              <th>Note</th>
              <th class="w-16"></th>
            </tr>
          </thead>
          <tbody id="ledgerBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <div id="panel3" class="tab-panel hidden">
      <div class="border-2 border-dashed border-zinc-700 rounded-3xl p-12 text-center">
        <p class="text-2xl mb-4">Import Ally Transactions CSV</p>
        <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleCSVImport(event)">
        <button onclick="triggerCSVImport()" class="px-10 py-5 bg-white text-zinc-950 rounded-2xl font-semibold text-lg hover:bg-emerald-400">Choose transactions.csv</button>
        <div id="importStatus" class="mt-8 text-sm"></div>
      </div>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50"></div>

  <script>
    const db = new Dexie('VibeForecastDB');
    db.version(2).stores({ 
      transactions: '++id, date, amount, description, isHistorical, userNote' 
    });

    let currentBalance = parseFloat(localStorage.getItem('vibeBalance')) || 0;

    function switchTab(n) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('panel' + n).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'border-b-2', 'border-emerald-400'));
      document.getElementById('tab' + n).classList.add('active', 'border-b-2', 'border-emerald-400');
      if (n === 0) renderLedger();
    }

    async function handleCSVImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      Papa.parse(file, {
        header: true, skipEmptyLines: true,
        complete: async function(results) {
          const newTxs = results.data.map(row => {
            const normalized = {};
            Object.keys(row).forEach(k => normalized[k.trim()] = (row[k] || '').toString().trim());
            if (!normalized.Date || normalized.Amount === '') return null;
            return {
              date: new Date(normalized.Date).getTime(),
              amount: parseFloat(normalized.Amount),
              description: normalized.Description || 'No description',
              userNote: null,
              isHistorical: true
            };
          }).filter(x => x && !isNaN(x.amount));
          await db.transactions.bulkAdd(newTxs);
          document.getElementById('importStatus').innerHTML = `✅ Imported ${newTxs.length} transactions!`;
          await loadData();
          setTimeout(() => switchTab(0), 1000);
        }
      });
    }

    async function loadData() {
      document.getElementById('currentBalanceDisplay').innerHTML = `Current Balance: <span class="font-bold">$${currentBalance.toFixed(2)}</span>`;
      await renderLedger();
    }

    async function renderLedger() {
      const allTxs = await db.transactions.toArray();
      const sorted = allTxs.sort((a, b) => a.date - b.date);
      
      let running = currentBalance;
      const now = new Date();
      now.setHours(0,0,0,0);
      const nowTs = now.getTime();
      
      const pastTxs = sorted.filter(tx => tx.date < nowTs);
      pastTxs.forEach(tx => running -= tx.amount);

      let balanceMap = new Map();
      let currentRunning = running;
      sorted.forEach(tx => {
        const beg = currentRunning;
        currentRunning += tx.amount;
        balanceMap.set(tx.id, {beg, end: currentRunning});
      });

      const displayRows = sorted.map(tx => {
        const bals = balanceMap.get(tx.id);
        const note = (tx.userNote || tx.description).split('~')[0].trim();
        return {...tx, beg: bals.beg, end: bals.end, displayNote: note, isProspective: !tx.isHistorical};
      }).sort((a, b) => b.date - a.date);

      const tbody = document.getElementById('ledgerBody');
      if (displayRows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-20 text-zinc-500">No data. Import CSV to start.</td></tr>';
        return;
      }

      tbody.innerHTML = displayRows.map(row => {
        const d = new Date(row.date);
        const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
        const credit = row.amount > 0 ? row.amount.toFixed(2) : '';
        const debit  = row.amount < 0 ? Math.abs(row.amount).toFixed(2) : '';
        const label = row.isProspective ? '<span class="text-[10px] bg-amber-900/60 text-amber-200 px-1.5 py-0.5 rounded mr-2 uppercase font-bold">Prospective</span>' : '';
        
        return `<tr class="${row.isProspective ? 'prospective-row' : 'ledger-row'}">
          <td class="font-medium cursor-pointer" onclick="${row.isProspective ? `editProspective(${row.id})` : ''}">${dateStr}</td>
          <td class="text-right text-zinc-400 cursor-pointer" onclick="${row.isProspective ? `editProspective(${row.id})` : ''}">$${row.beg.toFixed(2)}</td>
          <td class="text-right text-emerald-400 cursor-pointer" onclick="${row.isProspective ? `editProspective(${row.id})` : ''}">${credit}</td>
          <td class="text-right text-red-400 cursor-pointer" onclick="${row.isProspective ? `editProspective(${row.id})` : ''}">${debit}</td>
          <td class="text-right font-semibold cursor-pointer" onclick="${row.isProspective ? `editProspective(${row.id})` : ''}">$${row.end.toFixed(2)}</td>
          <td class="cursor-pointer" onclick="${row.isProspective ? `editProspective(${row.id})` : ''}">${label}${row.displayNote}</td>
          <td class="text-center">
             ${row.isProspective ? `<button onclick="showAddTransactionModal(${row.date})" class="text-zinc-500 hover:text-white text-lg">⊕</button>` : ''}
          </td>
        </tr>`;
      }).join('');
    }

    async function detectAndShowInLedger() {
      console.log("--- 🕵️ Detection Started (Recent 4 Months) ---");
      // 1. Clear old prospective items
      const old = await db.transactions.filter(t => !t.isHistorical).toArray();
      await db.transactions.bulkDelete(old.map(t => t.id));

      // 2. Define cutoff for 4 months ago
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - 4);
      const cutoffTs = cutoff.getTime();

      // 3. Query history limited to last 4 months
      const history = await db.transactions
        .filter(t => (t.isHistorical == true || t.isHistorical == 1) && t.date >= cutoffTs)
        .toArray();
      
      console.log(`Analyzing ${history.length} historical transactions from the last 4 months.`);

      if (history.length < 2) return alert("Not enough recent history to detect trends.");

      const groups = {};
      history.forEach(tx => {
        let clean = tx.description.split('~')[0].replace(/\d{4,}/g, 'X').trim();
        if (!groups[clean]) groups[clean] = [];
        groups[clean].push(tx);
      });

      const now = new Date(); now.setHours(0,0,0,0);
      const horizon = new Date(); horizon.setDate(horizon.getDate() + 35);
      const newProspective = [];

      for (const [desc, txs] of Object.entries(groups)) {
        if (txs.length < 2) continue;
        const sorted = txs.sort((a, b) => a.date - b.date);
        const lastTx = sorted[sorted.length - 1];
        
        const intervals = [];
        for (let i = 1; i < sorted.length; i++) {
          intervals.push((sorted[i].date - sorted[i-1].date) / 86400000);
        }
        const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;

        const isMonthly = (avg >= 25 && avg <= 32);
        const isBiWeekly = (avg >= 13 && avg <= 15);
        const isWeekly = (avg >= 6 && avg <= 8);

        if (isMonthly || isBiWeekly || isWeekly) {
          let nextDate = new Date(lastTx.date);
          while (nextDate.getTime() <= horizon.getTime()) {
            if (isMonthly) nextDate.setMonth(nextDate.getMonth() + 1);
            else nextDate.setDate(nextDate.getDate() + (isBiWeekly ? 14 : 7));
            
            if (nextDate.getTime() > now.getTime() && nextDate.getTime() <= horizon.getTime()) {
              newProspective.push({
                date: nextDate.getTime(),
                amount: lastTx.amount,
                description: desc,
                isHistorical: false
              });
            }
          }
        }
      }

      if (newProspective.length > 0) {
        await db.transactions.bulkAdd(newProspective);
        alert(`Found patterns for ${newProspective.length} future items based on the last 4 months.`);
      } else {
        alert("No recurring patterns found in recent history.");
      }
      await loadData();
    }

    function showAddTransactionModal(initialDateTs = null) {
      const modal = document.getElementById('modal');
      const dateStr = initialDateTs ? new Date(initialDateTs).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
      
      modal.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm border border-zinc-700 shadow-2xl">
          <h2 class="text-xl font-bold mb-6">Add Manual Transaction</h2>
          <div class="space-y-4">
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Date</label>
              <input id="newDate" type="date" value="${dateStr}" class="w-full bg-zinc-800 p-3 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Amount (Negative for bills)</label>
              <input id="newAmount" type="text" value="$0.00" class="w-full bg-zinc-800 p-3 rounded-xl outline-none" oninput="formatCurrencyInput(this)">
            </div>
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Description</label>
              <input id="newNote" type="text" placeholder="e.g. Rent, Groceries" class="w-full bg-zinc-800 p-3 rounded-xl outline-none">
            </div>
          </div>
          <div class="flex gap-2 mt-8">
            <button onclick="saveNewTransaction()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold">Add to Ledger</button>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="px-4 py-3 bg-zinc-700 rounded-xl">Cancel</button>
          </div>
        </div>`;
      modal.classList.remove('hidden');
    }

    async function saveNewTransaction() {
      const dateVal = document.getElementById('newDate').value;
      const date = new Date(dateVal + 'T12:00:00').getTime();
      const amountStr = document.getElementById('newAmount').value.replace(/[$,]/g, '');
      const amount = parseFloat(amountStr) || 0;
      const description = document.getElementById('newNote').value || "Manual Entry";

      await db.transactions.add({
        date, amount, description, isHistorical: false, userNote: null
      });
      document.getElementById('modal').classList.add('hidden');
      await loadData();
    }

    async function editProspective(id) {
      const tx = await db.transactions.get(id);
      if(!tx) return;
      const modal = document.getElementById('modal');
      const dateVal = new Date(tx.date).toISOString().split('T')[0];
      
      modal.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm border border-zinc-700 shadow-2xl">
          <h2 class="text-xl font-bold mb-6">Edit Transaction</h2>
          <div class="space-y-4">
            <input id="editDate" type="date" value="${dateVal}" class="w-full bg-zinc-800 p-3 rounded-xl outline-none">
            <input id="editAmount" type="text" value="$${tx.amount.toFixed(2)}" class="w-full bg-zinc-800 p-3 rounded-xl outline-none" oninput="formatCurrencyInput(this)">
            <input id="editNote" type="text" value="${tx.userNote || tx.description}" class="w-full bg-zinc-800 p-3 rounded-xl outline-none">
          </div>
          <div class="flex flex-col gap-2 mt-8">
            <button onclick="updateTx(${id})" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold">Save Changes</button>
            <div class="flex gap-2">
              <button onclick="deleteTx(${id})" class="flex-1 py-3 bg-red-900/30 text-red-400 rounded-xl">Discard</button>
              <button onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 py-3 bg-zinc-700 rounded-xl">Cancel</button>
            </div>
          </div>
        </div>`;
      modal.classList.remove('hidden');
    }

    async function updateTx(id) {
      const dateVal = document.getElementById('editDate').value;
      const date = new Date(dateVal + 'T12:00:00').getTime();
      const amountStr = document.getElementById('editAmount').value.replace(/[$,]/g, '');
      const amount = parseFloat(amountStr);
      const userNote = document.getElementById('editNote').value;
      
      await db.transactions.update(id, { date, amount, userNote });
      document.getElementById('modal').classList.add('hidden');
      await loadData();
    }

    async function deleteTx(id) {
      await db.transactions.delete(id);
      document.getElementById('modal').classList.add('hidden');
      await loadData();
    }

    function showSetBalanceModal() {
      const modal = document.getElementById('modal');
      modal.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm mx-4 border border-zinc-800">
          <h2 class="text-2xl mb-6">Set Current Balance</h2>
          <input id="balanceInput" type="text" value="$${currentBalance.toFixed(2)}" 
                 class="w-full bg-zinc-800 text-4xl text-center py-6 rounded-2xl italic text-zinc-500 outline-none"
                 oninput="formatCurrencyInput(this)">
          <div class="flex gap-3 mt-8">
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 py-4 bg-zinc-700 rounded-2xl">Cancel</button>
            <button onclick="saveCurrentBalance()" class="flex-1 py-4 bg-emerald-500 rounded-2xl font-bold">Save</button>
          </div>
        </div>`;
      modal.classList.remove('hidden');
    }

    function formatCurrencyInput(input) {
      let isNegative = input.value.includes('-');
      let digits = input.value.replace(/\D/g, '');
      if (!digits) return;
      let val = (parseInt(digits) / 100).toFixed(2);
      input.value = (isNegative ? '-' : '') + '$' + val;
      input.classList.remove('italic', 'text-zinc-500');
    }

    function saveCurrentBalance() {
      const str = document.getElementById('balanceInput').value.replace(/[$,]/g, '');
      currentBalance = parseFloat(str) || 0;
      localStorage.setItem('vibeBalance', currentBalance);
      document.getElementById('modal').classList.add('hidden');
      loadData();
    }

    function triggerCSVImport() { document.getElementById('csvInput').click(); }
    function exportBackup() { db.transactions.toArray().then(d => {
      const blob = new Blob([JSON.stringify(d)], {type:'application/json'});
      const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ledger_backup.json'; a.click();
    });}
    function importBackup(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const data = JSON.parse(ev.target.result);
        await db.transactions.clear();
        await db.transactions.bulkAdd(data);
        loadData();
      };
      reader.readAsText(file);
    }

    window.onload = () => { loadData(); switchTab(0); };
  </script>
</body>
</html>
