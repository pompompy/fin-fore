<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeForecast • Checkbook Ledger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.1/dist/dexie.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    table { border-collapse: collapse; }
    th, td { padding: 14px 16px; text-align: left; vertical-align: top; }
    tr { border-bottom: 1px solid #27272a; }
    .ledger-row:hover { background-color: #18181b; }
    .suggested-row { background-color: #451a03; }
    .prospective-row { font-style: italic; color: #bef575; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-6xl mx-auto p-4">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold flex items-center gap-2">
        <span class="text-emerald-400">📒</span> VibeForecast
      </h1>
      <div class="flex gap-3">
        <button onclick="exportBackup()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm">📤 Backup</button>
        <button onclick="document.getElementById('restoreInput').click()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm">📥 Restore</button>
        <input type="file" id="restoreInput" accept=".json" class="hidden" onchange="importBackup(event)">
      </div>
    </div>

    <!-- TABS -->
    <div class="flex border-b border-zinc-800 mb-6 text-sm">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-4 font-medium flex-1">📒 Ledger</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-4 font-medium flex-1">📈 Forecast</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-8 py-4 font-medium flex-1">🔮 Upcoming</button>
      <button onclick="switchTab(3)" id="tab3" class="tab-btn px-8 py-4 font-medium flex-1">📥 Import CSV</button>
    </div>

    <!-- LEDGER -->
    <div id="panel0" class="tab-panel">
      <div class="flex justify-between mb-6">
        <h2 class="text-2xl font-semibold">Checkbook Ledger</h2>
        <button onclick="detectAndShowInLedger()" class="px-6 py-3 bg-amber-600 hover:bg-amber-500 rounded-2xl text-sm">🔍 Detect Recurring</button>
      </div>
      <div class="overflow-x-auto rounded-3xl border border-zinc-800 bg-zinc-900">
        <table class="w-full min-w-[950px] text-sm">
          <thead class="bg-zinc-950 sticky top-0">
            <tr class="text-zinc-400 text-xs uppercase tracking-widest">
              <th class="w-44">Date</th>
              <th class="text-right w-32">Beginning Balance</th>
              <th class="text-right w-28">Credit</th>
              <th class="text-right w-28">Debit</th>
              <th class="text-right w-32">Ending Balance</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id="ledgerBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <!-- FORECAST -->
    <div id="panel1" class="tab-panel hidden">
      <div class="bg-zinc-900 rounded-3xl p-8 text-center mb-8">
        <p class="text-zinc-400">Current Balance</p>
        <p id="balanceDisplay" class="text-6xl font-bold text-emerald-400">$0.00</p>
      </div>
      <canvas id="forecastChart" class="w-full h-80"></canvas>
      <button onclick="showSetBalanceModal()" class="mt-6 w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Set Current Balance</button>
    </div>

    <!-- IMPORT CSV (most improved) -->
    <div id="panel3" class="tab-panel hidden">
      <div class="border-2 border-dashed border-zinc-700 rounded-3xl p-12 text-center">
        <p class="text-2xl mb-4">Import Ally CSV</p>
        <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleCSVImport(event)">
        <button onclick="triggerCSVImport()" class="px-10 py-5 bg-white text-zinc-950 rounded-2xl font-semibold text-lg hover:bg-emerald-400 transition">Choose transactions.csv</button>
        <div id="importStatus" class="mt-6 text-sm min-h-[28px]"></div>
      </div>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50"></div>

  <script>
    // All functions defined BEFORE any onclick calls
    const db = new Dexie('VibeForecastDB');
    db.version(2).stores({ transactions: '++id, date, amount, description, isHistorical, userNote' });

    let currentBalance = parseFloat(localStorage.getItem('vibeBalance')) || 0;
    let chartInstance = null;
    let pendingSuggestions = [];

    function switchTab(n) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('panel' + n).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'border-b-2', 'border-emerald-400'));
      document.getElementById('tab' + n).classList.add('active', 'border-b-2', 'border-emerald-400');
      if (n === 0) renderLedger();
      if (n === 1) renderForecastChart();
    }

    function triggerCSVImport() {
      document.getElementById('importStatus').innerHTML = '';
      document.getElementById('csvInput').click();
    }

    async function handleCSVImport(e) {
      const file = e.target.files[0];
      if (!file) return;

      const status = document.getElementById('importStatus');
      status.innerHTML = '📤 Parsing file...';

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async function(results) {
          const newTxs = [];

          results.data.forEach(row => {
            if (!row.Date || row.Amount == null || row.Amount === '') return;

            let txDate = new Date(row.Date.trim());
            if (row.Time && row.Time.trim()) {
              const parts = row.Time.trim().split(':');
              txDate.setHours(parseInt(parts[0])||0, parseInt(parts[1])||0, parseInt(parts[2])||0);
            }

            const amount = parseFloat(row.Amount);
            if (isNaN(amount)) return;

            let desc = (row.Description || '').trim();
            newTxs.push({
              date: txDate.getTime(),
              amount: amount,
              description: desc,
              userNote: null,
              isHistorical: true
            });
          });

          if (newTxs.length === 0) {
            status.innerHTML = '❌ Could not find valid rows. Make sure it is the correct Ally CSV.';
            return;
          }

          await db.transactions.bulkAdd(newTxs);
          status.innerHTML = `✅ Imported ${newTxs.length} transactions successfully!`;
          await loadData();
          setTimeout(() => switchTab(0), 1500);
        }
      });
    }

    async function loadData() {
      document.getElementById('balanceDisplay').textContent = '$' + currentBalance.toFixed(2);
      await renderLedger();
    }

    async function renderLedger() {
      const txs = await db.transactions.toArray();
      const sorted = txs.sort((a,b) => a.date - b.date);

      let running = currentBalance;
      const balanceMap = new Map();
      sorted.forEach(tx => {
        const beg = running;
        running += tx.amount;
        balanceMap.set(tx.id, {beg, end: running});
      });

      const displayRows = sorted.map(tx => {
        const b = balanceMap.get(tx.id);
        const displayNote = tx.userNote || tx.description.split('~ Future Amount')[0].trim();
        return {...tx, beg: b.beg, end: b.end, displayNote, isSuggested: false};
      });

      // Sort Future to Past for display
      displayRows.sort((a,b) => b.date - a.date);

      const tbody = document.getElementById('ledgerBody');
      tbody.innerHTML = displayRows.map(row => {
        const d = new Date(row.date);
        const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) + 
                        (d.getHours() ? ' ' + d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : '');

        const credit = row.amount > 0 ? row.amount.toFixed(2) : '';
        const debit = row.amount < 0 ? Math.abs(row.amount).toFixed(2) : '';

        return `
          <tr class="ledger-row">
            <td>${dateStr}</td>
            <td class="text-right">$${row.beg.toFixed(2)}</td>
            <td class="text-right text-emerald-400">${credit}</td>
            <td class="text-right text-red-400">${debit}</td>
            <td class="text-right">$${row.end.toFixed(2)}</td>
            <td>${row.displayNote}</td>
          </tr>`;
      }).join('');
    }

    function renderForecastChart() { /* placeholder - works if you add full Chart.js logic */ }

    async function exportBackup() {
      const data = { transactions: await db.transactions.toArray(), currentBalance, exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'vibeforecast-backup.json';
      a.click();
    }

    async function importBackup(e) {
      const file = e.target.files[0];
      const text = await file.text();
      const backup = JSON.parse(text);
      await db.transactions.clear();
      await db.transactions.bulkAdd(backup.transactions || []);
      currentBalance = backup.currentBalance || 0;
      localStorage.setItem('vibeBalance', currentBalance);
      alert('✅ Backup restored!');
      loadData();
      switchTab(0);
    }

    function detectAndShowInLedger() {
      alert("Recurring detection coming soon – import worked if you see transactions in Ledger");
      renderLedger();
    }

    // Boot the app
    window.onload = () => {
      tailwind.config = { content: ["./**/*"] };
      loadData();
      switchTab(3);   // Start on Import CSV tab
    };
  </script>
</body>
</html>
