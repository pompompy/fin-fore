<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeForecast • Checkbook Ledger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.1/dist/dexie.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    table { border-collapse: collapse; }
    th, td { padding: 14px 16px; text-align: left; vertical-align: top; }
    tr { border-bottom: 1px solid #27272a; }
    .ledger-row:hover { background-color: #18181b; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-6xl mx-auto p-4">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold flex items-center gap-2">
        <span class="text-emerald-400">📒</span> VibeForecast
      </h1>
      <div class="flex gap-3">
        <button onclick="exportBackup()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm">📤 Backup</button>
        <button onclick="document.getElementById('restoreInput').click()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm">📥 Restore</button>
        <input type="file" id="restoreInput" accept=".json" class="hidden" onchange="importBackup(event)">
      </div>
    </div>

    <!-- TABS -->
    <div class="flex border-b border-zinc-800 mb-6 text-sm">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-4 font-medium flex-1">📒 Ledger</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-4 font-medium flex-1">📈 Forecast</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-8 py-4 font-medium flex-1">🔮 Upcoming</button>
      <button onclick="switchTab(3)" id="tab3" class="tab-btn px-8 py-4 font-medium flex-1">📥 Import CSV</button>
    </div>

    <!-- IMPORT CSV TAB (with heavy debugging) -->
    <div id="panel3" class="tab-panel">
      <div class="border-2 border-dashed border-zinc-700 rounded-3xl p-12 text-center">
        <p class="text-2xl mb-4">Import Ally Transactions CSV</p>
        <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleCSVImport(event)">
        <button onclick="triggerCSVImport()" class="px-10 py-5 bg-white text-zinc-950 rounded-2xl font-semibold text-lg hover:bg-emerald-400">Choose transactions.csv</button>
        <div id="importStatus" class="mt-8 text-sm text-left max-w-md mx-auto bg-zinc-900 p-4 rounded-2xl font-mono whitespace-pre-wrap"></div>
      </div>
    </div>

    <!-- LEDGER TAB -->
    <div id="panel0" class="tab-panel hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold">Checkbook Ledger</h2>
      </div>
      <div class="overflow-x-auto rounded-3xl border border-zinc-800 bg-zinc-900">
        <table class="w-full min-w-[950px] text-sm">
          <thead class="bg-zinc-950 sticky top-0">
            <tr class="text-zinc-400 text-xs uppercase tracking-widest">
              <th class="w-44">Date</th>
              <th class="text-right w-32">Beginning Balance</th>
              <th class="text-right w-28">Credit</th>
              <th class="text-right w-28">Debit</th>
              <th class="text-right w-32">Ending Balance</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id="ledgerBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50"></div>

  <script>
    const db = new Dexie('VibeForecastDB');
    db.version(2).stores({ transactions: '++id, date, amount, description, isHistorical, userNote' });

    let currentBalance = parseFloat(localStorage.getItem('vibeBalance')) || 0;

    function switchTab(n) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('panel' + n).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'border-b-2', 'border-emerald-400'));
      document.getElementById('tab' + n).classList.add('active', 'border-b-2', 'border-emerald-400');
      if (n === 0) renderLedger();
    }

    function triggerCSVImport() {
      document.getElementById('importStatus').innerHTML = '';
      document.getElementById('csvInput').click();
    }

    async function handleCSVImport(e) {
      const file = e.target.files[0];
      if (!file) {
        console.error("No file selected");
        return;
      }

      const status = document.getElementById('importStatus');
      status.innerHTML = `📤 Starting parse of ${file.name} (${(file.size/1024).toFixed(1)} KB)...\n`;

      console.log("=== CSV Import Started ===");
      console.log("File name:", file.name);
      console.log("File size:", file.size);

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async function(results) {
          console.log("PapaParse complete. Rows received:", results.data.length);
          console.log("Headers found:", results.meta.fields);

          status.innerHTML += `PapaParse found ${results.data.length} rows.\nHeaders: ${results.meta.fields ? results.meta.fields.join(', ') : 'none'}\n\n`;

          const newTxs = [];
          let validCount = 0;

          results.data.forEach((row, idx) => {
            // Normalize keys (trim spaces)
            const normalized = {};
            Object.keys(row).forEach(key => {
              const cleanKey = key.trim();
              normalized[cleanKey] = (row[key] || '').toString().trim();
            });

            const hasDate = !!normalized.Date;
            const hasAmount = normalized.Amount !== '' && !isNaN(parseFloat(normalized.Amount));

            if (idx < 5) {  // Log first few rows for debugging
              console.log(`Row ${idx}:`, normalized);
              status.innerHTML += `Row ${idx}: Date=${normalized.Date || 'MISSING'}, Amount=${normalized.Amount || 'MISSING'}\n`;
            }

            if (!hasDate || !hasAmount) return;

            let txDate = new Date(normalized.Date);
            if (normalized.Time) {
              const parts = normalized.Time.split(':');
              txDate.setHours(parseInt(parts[0])||0, parseInt(parts[1])||0, parseInt(parts[2])||0);
            }

            const amount = parseFloat(normalized.Amount);
            const desc = normalized.Description || 'No description';

            newTxs.push({
              date: txDate.getTime(),
              amount: amount,
              description: desc,
              userNote: null,
              isHistorical: true
            });
            validCount++;
          });

          console.log(`Valid transactions extracted: ${validCount}`);

          status.innerHTML += `\nValid transactions found: ${validCount}\n`;

          if (validCount === 0) {
            status.innerHTML += `\n❌ No valid rows. Possible causes:\n`;
            status.innerHTML += `- Column names have unexpected spaces or quotes\n`;
            status.innerHTML += `- Amount column not recognized\n`;
            status.innerHTML += `- File is not a standard Ally CSV\n\n`;
            status.innerHTML += `Check the console (F12) for detailed row output.`;
            return;
          }

          try {
            await db.transactions.clear(); // Optional: clear old data for clean test
            await db.transactions.bulkAdd(newTxs);
            status.innerHTML += `✅ SUCCESS! Imported ${validCount} transactions.\nSwitching to Ledger...`;
            await loadData();
            setTimeout(() => switchTab(0), 1500);
          } catch (err) {
            console.error("Save error:", err);
            status.innerHTML += `❌ Error saving to database: ${err.message}`;
          }
        },
        error: function(err) {
          console.error("PapaParse error:", err);
          status.innerHTML += `❌ PapaParse failed: ${err}`;
        }
      });
    }

    async function loadData() {
      await renderLedger();
    }

    async function renderLedger() {
      const txs = await db.transactions.toArray();
      const tbody = document.getElementById('ledgerBody');
      
      if (txs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-zinc-400">No transactions loaded yet</td></tr>`;
        return;
      }

      const sorted = [...txs].sort((a,b) => a.date - b.date);
      let running = currentBalance;
      const balanceMap = new Map();
      sorted.forEach(tx => {
        const beg = running;
        running += tx.amount;
        balanceMap.set(tx.id, {beg, end: running});
      });

      const displayRows = sorted.map(tx => {
        const b = balanceMap.get(tx.id);
        const note = (tx.userNote || tx.description).split('~ Future Amount')[0].trim();
        return {...tx, beg: b.beg, end: b.end, displayNote: note};
      }).sort((a,b) => b.date - a.date);

      tbody.innerHTML = displayRows.map(row => {
        const d = new Date(row.date);
        const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) +
                        (d.getHours() ? ' ' + d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : '');

        const credit = row.amount > 0 ? row.amount.toFixed(2) : '';
        const debit  = row.amount < 0 ? Math.abs(row.amount).toFixed(2) : '';

        return `
          <tr class="ledger-row">
            <td>${dateStr}</td>
            <td class="text-right">$${row.beg.toFixed(2)}</td>
            <td class="text-right text-emerald-400">${credit}</td>
            <td class="text-right text-red-400">${debit}</td>
            <td class="text-right">$${row.end.toFixed(2)}</td>
            <td>${row.displayNote}</td>
          </tr>`;
      }).join('');
    }

    function exportBackup() { alert("Backup coming soon"); }
    function importBackup(e) { alert("Restore coming soon"); }

    window.onload = () => {
      tailwind.config = { content: ["./**/*"] };
      switchTab(3);   // Start on Import tab
    };
  </script>
</body>
</html>
