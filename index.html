<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fin-Fore simple personal finance forecaster • Checkbook Ledger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.1/dist/dexie.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    table { border-collapse: collapse; }
    th, td { padding: 14px 16px; text-align: left; vertical-align: top; }
    tr { border-bottom: 1px solid #27272a; }
    .ledger-row:hover { background-color: #18181b; }
    .prospective-row { font-style: italic; color: #bef575; cursor: pointer; }
    .prospective-row:hover { background-color: #1a2e0e; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-6xl mx-auto p-4">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold flex items-center gap-2">
        <span class="text-emerald-400">📒</span> Fin-Fore simple personal finance forecaster
      </h1>
      <div class="flex gap-3">
        <button onclick="showSetBalanceModal()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm">Set Current Balance</button>
        <button onclick="exportBackup()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm">📤 Backup</button>
        <button onclick="document.getElementById('restoreInput').click()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm">📥 Restore</button>
        <input type="file" id="restoreInput" accept=".json" class="hidden" onchange="importBackup(event)">
      </div>
    </div>

    <div class="flex border-b border-zinc-800 mb-6 text-sm">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-4 font-medium flex-1">📒 Ledger</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-4 font-medium flex-1">📈 Forecast</button>
      <button onclick="switchTab(3)" id="tab3" class="tab-btn px-8 py-4 font-medium flex-1">📥 Import CSV</button>
    </div>

    <div id="panel0" class="tab-panel">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h2 class="text-2xl font-semibold">Checkbook Ledger</h2>
          <p id="currentBalanceDisplay" class="text-emerald-400 font-medium"></p>
        </div>
        <button onclick="detectAndShowInLedger()" class="px-6 py-3 bg-amber-600 hover:bg-amber-500 rounded-2xl text-sm font-medium">🔍 Detect Recurring</button>
      </div>
      <div class="overflow-x-auto rounded-3xl border border-zinc-800 bg-zinc-900">
        <table class="w-full min-w-[950px] text-sm">
          <thead class="bg-zinc-950 sticky top-0">
            <tr class="text-zinc-400 text-xs uppercase tracking-widest">
              <th class="w-48">Date</th>
              <th class="text-right w-32">Beginning Balance</th>
              <th class="text-right w-28">Credit</th>
              <th class="text-right w-28">Debit</th>
              <th class="text-right w-32">Ending Balance</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id="ledgerBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <div id="panel3" class="tab-panel hidden">
      <div class="border-2 border-dashed border-zinc-700 rounded-3xl p-12 text-center">
        <p class="text-2xl mb-4">Import Ally Transactions CSV</p>
        <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleCSVImport(event)">
        <button onclick="triggerCSVImport()" class="px-10 py-5 bg-white text-zinc-950 rounded-2xl font-semibold text-lg hover:bg-emerald-400">Choose transactions.csv</button>
        <div id="importStatus" class="mt-8 text-sm"></div>
      </div>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50"></div>

  <script>
    const db = new Dexie('VibeForecastDB');
    db.version(2).stores({ transactions: '++id, date, amount, description, isHistorical, userNote' });

    let currentBalance = parseFloat(localStorage.getItem('vibeBalance')) || 0;

    function switchTab(n) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('panel' + n).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'border-b-2', 'border-emerald-400'));
      document.getElementById('tab' + n).classList.add('active', 'border-b-2', 'border-emerald-400');
      if (n === 0) renderLedger();
    }

    function triggerCSVImport() {
      document.getElementById('importStatus').innerHTML = '';
      document.getElementById('csvInput').click();
    }

    async function handleCSVImport(e) {
      const file = e.target.files[0];
      if (!file) return;

      const status = document.getElementById('importStatus');
      status.innerHTML = '📤 Parsing Ally CSV...';

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async function(results) {
          const newTxs = [];
          results.data.forEach(row => {
            const normalized = {};
            Object.keys(row).forEach(k => normalized[k.trim()] = (row[k] || '').toString().trim());

            if (!normalized.Date || normalized.Amount === '') return;

            let txDate = new Date(normalized.Date);
            if (normalized.Time) {
              const parts = normalized.Time.split(':');
              txDate.setHours(parseInt(parts[0])||0, parseInt(parts[1])||0, parseInt(parts[2])||0);
            }

            const amount = parseFloat(normalized.Amount);
            if (isNaN(amount)) return;

            const desc = normalized.Description || 'No description';

            newTxs.push({
              date: txDate.getTime(),
              amount: amount,
              description: desc,
              userNote: null,
              isHistorical: true
            });
          });

          if (newTxs.length === 0) {
            status.innerHTML = '❌ No valid rows found.';
            return;
          }

          await db.transactions.bulkAdd(newTxs);
          status.innerHTML = `✅ Imported ${newTxs.length} transactions!`;
          await loadData();
          setTimeout(() => switchTab(0), 1200);
        }
      });
    }

    async function loadData() {
      document.getElementById('currentBalanceDisplay').innerHTML = `Current Balance: <span class="font-bold">$${currentBalance.toFixed(2)}</span>`;
      await renderLedger();
    }

    async function renderLedger() {
      const allTxs = await db.transactions.toArray();
      if (allTxs.length === 0) {
        document.getElementById('ledgerBody').innerHTML = `<tr><td colspan="6" class="text-center py-12 text-zinc-400">Import your Ally CSV to see the ledger</td></tr>`;
        return;
      }

      const sorted = [...allTxs].sort((a, b) => a.date - b.date);
      let running = currentBalance;
      const now = Date.now();
      const pastTxs = sorted.filter(tx => tx.date < now);
      pastTxs.forEach(tx => running -= tx.amount);

      let balanceMap = new Map();
      let currentRunning = running;

      sorted.forEach(tx => {
        const beg = currentRunning;
        currentRunning += tx.amount;
        balanceMap.set(tx.id, {beg, end: currentRunning});
      });

      const displayRows = sorted.map(tx => {
        const bals = balanceMap.get(tx.id);
        const note = (tx.userNote || tx.description).split('~ Future Amount')[0].trim();
        return {...tx, beg: bals.beg, end: bals.end, displayNote: note, isProspective: !tx.isHistorical};
      }).sort((a, b) => b.date - a.date);

      const tbody = document.getElementById('ledgerBody');
      tbody.innerHTML = displayRows.map(row => {
        const d = new Date(row.date);
        const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) +
                        (d.getHours() ? ' ' + d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : '');

        const credit = row.amount > 0 ? row.amount.toFixed(2) : '';
        const debit  = row.amount < 0 ? Math.abs(row.amount).toFixed(2) : '';

        const rowClass = row.isProspective ? 'prospective-row' : 'ledger-row';
        const clickAttr = row.isProspective ? `onclick="editProspective(${row.id})"` : '';
        const label = row.isProspective ? '<span class="text-[10px] bg-amber-900/40 text-amber-200 px-1.5 py-0.5 rounded mr-2 uppercase tracking-tighter">Prospective (Click to edit)</span>' : '';

        return `
          <tr class="${rowClass}" ${clickAttr}>
            <td class="font-medium">${dateStr}</td>
            <td class="text-right">$${row.beg.toFixed(2)}</td>
            <td class="text-right text-emerald-400">${credit}</td>
            <td class="text-right text-red-400">${debit}</td>
            <td class="text-right font-medium">$${row.end.toFixed(2)}</td>
            <td>${label}${row.displayNote}</td>
          </tr>`;
      }).join('');
    }

    async function detectAndShowInLedger() {
      console.log("--- Starting Detection Cycle ---");
      const history = await db.transactions.where('isHistorical').equals(1).toArray();
      const groups = {};
      
      // Better cleaning of descriptions
      history.forEach(tx => {
        let cleanDesc = tx.description.split('~')[0].replace(/\d{4,}/g, 'X').trim();
        if (!groups[cleanDesc]) groups[cleanDesc] = [];
        groups[cleanDesc].push(tx);
      });

      const now = new Date();
      const horizon = new Date();
      horizon.setDate(horizon.getDate() + 45); 
      
      const newProspective = [];

      for (const [desc, txs] of Object.entries(groups)) {
        if (txs.length < 2) continue;

        const sorted = txs.sort((a, b) => a.date - b.date);
        
        // Calculate intervals
        let intervals = [];
        for (let i = 1; i < sorted.length; i++) {
          intervals.push((sorted[i].date - sorted[i-1].date) / (1000 * 60 * 60 * 24));
        }
        
        const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
        const lastTx = sorted[sorted.length - 1];
        const lastDate = new Date(lastTx.date);

        console.log(`Analyzing: "${desc}" | Instances: ${txs.length} | Avg Interval: ${avg.toFixed(1)} days`);

        let patternFound = false;
        let intervalDays = 0;

        // 1. Monthly Date-of-Month Logic (the "5th of the month" rule)
        const daysOfMonths = sorted.map(t => new Date(t.date).getDate());
        const uniqueDays = [...new Set(daysOfMonths)];
        const isMonthlySameDay = uniqueDays.length <= 2 && avg > 25; // Tolerance for weekend shifts

        if (isMonthlySameDay) {
          console.log(`  -> Detected Monthly Pattern (Day of month: ${uniqueDays})`);
          intervalDays = "MONTHLY";
          patternFound = true;
        } 
        else if (avg >= 12 && avg <= 16) { intervalDays = 14; patternFound = true; }
        else if (avg >= 6 && avg <= 8) { intervalDays = 7; patternFound = true; }

        if (patternFound) {
          let nextDate = new Date(lastTx.date);
          while (nextDate.getTime() <= horizon.getTime()) {
            if (intervalDays === "MONTHLY") {
              nextDate.setMonth(nextDate.getMonth() + 1);
              // Ensure we stick to the preferred day if month lengths differ
              nextDate.setDate(uniqueDays[0]);
            } else {
              nextDate.setDate(nextDate.getDate() + intervalDays);
            }

            if (nextDate.getTime() > now.getTime() && nextDate.getTime() <= horizon.getTime()) {
              newProspective.push({
                date: nextDate.getTime(),
                amount: lastTx.amount,
                description: desc,
                userNote: null,
                isHistorical: false
              });
            }
          }
        }
      }

      if (newProspective.length > 0) {
        await db.transactions.bulkAdd(newProspective);
        alert(`Added ${newProspective.length} transactions based on trends.`);
      } else {
        alert("Check console (F12) for trend analysis log.");
      }
      await loadData();
    }

    async function editProspective(id) {
      const tx = await db.transactions.get(id);
      if (!tx) return;

      const dateStr = new Date(tx.date).toISOString().split('T')[0];
      const modal = document.getElementById('modal');
      
      modal.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm mx-4 border border-zinc-700">
          <h2 class="text-xl font-bold mb-4">Edit Prospective Item</h2>
          <div class="space-y-4">
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Date</label>
              <input id="editDate" type="date" value="${dateStr}" class="w-full bg-zinc-800 p-3 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Amount</label>
              <input id="editAmount" type="text" value="$${tx.amount.toFixed(2)}" 
                     class="w-full bg-zinc-800 p-3 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500"
                     oninput="formatCurrencyInput(this)">
            </div>
            <div>
              <label class="text-xs text-zinc-400 block mb-1">Note</label>
              <input id="editNote" type="text" value="${tx.userNote || tx.description}" class="w-full bg-zinc-800 p-3 rounded-xl outline-none">
            </div>
          </div>
          <div class="flex flex-col gap-2 mt-6">
            <button onclick="updateTx(${id})" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold">Save Changes</button>
            <div class="flex gap-2">
              <button onclick="deleteTx(${id})" class="flex-1 py-3 bg-red-900/50 hover:bg-red-800 text-red-200 rounded-xl">Discard</button>
              <button onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 py-3 bg-zinc-700 rounded-xl">Cancel</button>
            </div>
          </div>
        </div>`;
      modal.classList.remove('hidden');
    }

    async function updateTx(id) {
      const date = new Date(document.getElementById('editDate').value).getTime();
      const amountStr = document.getElementById('editAmount').value.replace(/[$,]/g, '');
      const amount = parseFloat(amountStr);
      const userNote = document.getElementById('editNote').value;

      await db.transactions.update(id, { date, amount, userNote });
      document.getElementById('modal').classList.add('hidden');
      await loadData();
    }

    async function deleteTx(id) {
      if(confirm("Remove this prospective transaction?")) {
        await db.transactions.delete(id);
        document.getElementById('modal').classList.add('hidden');
        await loadData();
      }
    }

    function showSetBalanceModal() {
      const modal = document.getElementById('modal');
      const val = currentBalance > 0 ? `$${currentBalance.toFixed(2)}` : '$0.00';
      modal.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm mx-4">
          <h2 class="text-2xl mb-6">Set Current Balance</h2>
          <input id="balanceInput" type="text" value="${val}" 
                 class="w-full bg-zinc-800 text-4xl text-center py-6 rounded-2xl italic text-zinc-500 outline-none"
                 oninput="formatCurrencyInput(this)" onfocus="if(this.value==='$0.00') this.value=''">
          <div class="flex gap-3 mt-8">
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 py-4 bg-zinc-700 rounded-2xl">Cancel</button>
            <button onclick="saveCurrentBalance()" class="flex-1 py-4 bg-emerald-500 rounded-2xl">Save</button>
          </div>
        </div>`;
      modal.classList.remove('hidden');
    }

    function formatCurrencyInput(input) {
      let digits = input.value.replace(/[^\d-]/g, '');
      if (digits === '' || digits === '-') return;
      let numericValue = (parseInt(digits) / 100).toFixed(2);
      input.value = `$${numericValue}`;
      input.classList.remove('italic', 'text-zinc-500');
    }

    function saveCurrentBalance() {
      currentBalance = parseFloat(document.getElementById('balanceInput').value.replace(/[$,]/g, '')) || 0;
      localStorage.setItem('vibeBalance', currentBalance);
      document.getElementById('modal').classList.add('hidden');
      loadData();
    }

    function exportBackup() { db.transactions.toArray().then(d => {
      const blob = new Blob([JSON.stringify(d)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='ledger_backup.json'; a.click();
    });}

    window.onload = () => { loadData(); switchTab(0); };
  </script>
</body>
</html>
